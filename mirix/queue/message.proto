// Protocol Buffer definition for queue messages
syntax = "proto3";

package mirix;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Main request message for send_messages
message QueueMessage {
  // Client ID - identifies the client performing the action (for auth/write operations)
  // The full Client object is looked up from the database by the worker
  string client_id = 1;


  // Required agent identifier
  string agent_id = 2;

  // List of input messages to send
  repeated MessageCreate input_messages = 3;

  // Optional chaining flag
  optional bool chaining = 4;

  // User ID - identifies the end user within the client application
  optional string user_id = 5;

  // Optional verbose flag
  optional bool verbose = 6;

  // Filter tags as flexible JSON structure
  google.protobuf.Struct filter_tags = 7;

  // Optional use_cache flag for controlling Redis cache behavior
  optional bool use_cache = 8;

  // Optional occurred_at timestamp for episodic memory
  // ISO 8601 format string (e.g., "2025-11-18T10:30:00+00:00")
  optional string occurred_at = 9;

  // ========== LANGFUSE TRACE CONTEXT (for observability) ==========
  // LangFuse trace ID for distributed tracing continuity
  optional string langfuse_trace_id = 10;

  // LangFuse observation/span ID (parent span)
  optional string langfuse_observation_id = 11;

  // LangFuse session ID (agent/conversation session)
  optional string langfuse_session_id = 12;

  // LangFuse user ID (for user-level tracking)
  optional string langfuse_user_id = 13;

  // Applied to blocks only when they are created (e.g. from default user template). Not applied on update.
  google.protobuf.Struct block_filter_tags = 14;

  // How to apply block_filter_tags to existing blocks: "merge" (default) or "replace".
  optional string block_filter_tags_update_mode = 15;

  // ========== MEMORY SOURCE FIELDS (for citation tracking & idempotency) ==========
  // Pre-generated source ID ("src-{uuid4}") for citation tracking
  optional string memory_source_id = 16;

  // Client-provided stable dedup key
  optional string external_id = 17;

  // Groups multiple saves into a thread
  optional string external_thread_id = 18;

  // Freeform string, defaults to "conversation"
  optional string source_type = 19;

  // Originating system label
  optional string source_system = 20;

  // Client-provided lineage context bag
  google.protobuf.Struct source_metadata = 21;

  // Client-provided summary (bypasses generation)
  optional string summary = 22;

  // Opt-in async summary generation
  optional bool summarize = 23;

  // Original per-turn messages with per-message metadata (external_message_id, occurred_at).
  // These are used for source_message persistence only, not for agent processing.
  // The input_messages field (field 3) carries the packed/flattened messages for the agent.
  repeated MessageCreate source_messages = 24;

  // Direct memory writes — bypasses LLM dispatch at the meta-agent.
  // Each entry tells the meta-agent to call a registered handler for
  // memory_type and pass payload_json-decoded fields as kwargs.
  repeated DirectMemoryWrite direct_writes = 25;
}

// User representation
message User {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  string status = 4;
  string timezone = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  bool is_deleted = 8;
}

// Message creation request
message MessageCreate {
  enum Role {
    ROLE_UNSPECIFIED = 0;
    ROLE_USER = 1;
    ROLE_SYSTEM = 2;
    ROLE_ASSISTANT = 3;
  }

  // The role of the participant
  Role role = 1;

  // Content can be either simple text or complex structured content
  oneof content_type {
    string text_content = 2;
    MessageContentList structured_content = 3;
  }

  // Optional name of the participant
  optional string name = 4;

  // Optional offline threading id
  optional string otid = 5;

  // Optional sender identifier
  optional string sender_id = 6;

  // Optional multi-agent group id
  optional string group_id = 7;

  // Per-message source fields (for citation tracking)
  // Client-provided stable message ID
  optional string external_message_id = 8;

  // Per-message timestamp (ISO 8601 string)
  optional string message_occurred_at = 9;

  // Client-provided per-message property bag
  google.protobuf.Struct message_metadata = 10;
}

// List of message content parts (for structured content)
message MessageContentList {
  repeated MessageContentPart parts = 1;
}

// Individual content part (text, image, file, etc.)
message MessageContentPart {
  oneof content {
    TextContent text = 1;
    ImageContent image = 2;
    FileContent file = 3;
    CloudFileContent cloud_file = 4;
  }
}

message TextContent {
  string text = 1;
}

message ImageContent {
  string image_id = 1;
  optional string detail = 2;
}

message FileContent {
  string file_id = 1;
}

message CloudFileContent {
  string cloud_file_uri = 1;
}

// Direct-write request — one memory to be written without LLM dispatch.
message DirectMemoryWrite {
  string memory_type = 1;    // "episodic" | "semantic" | ... (handler dict is authoritative)
  string payload_json = 2;   // JSON-encoded memory-type-specific fields
}

